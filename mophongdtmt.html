<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng 3D Trái Đất - Mặt Trời (Bản rút gọn Earth Space Lab)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas3d { width: 100vw; height: 100vh; display: block; }
        .ui-panel { position: absolute; top: 20px; left: 20px; background: rgba(10, 10, 10, 0.85); padding: 25px; border-radius: 12px; backdrop-filter: blur(10px); box-shadow: 0 5px 25px rgba(0,0,0,0.7); border: 1px solid #2a2a2a; max-width: 350px; }
        h1 { font-size: 1.5em; margin-top: 0; color: #f39c12; }
        .controls { margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #38bdf8; }
        input[type=range] { width: 100%; margin-bottom: 20px; cursor: pointer; }
        .status-panel { position: absolute; bottom: 20px; right: 20px; background: rgba(10, 10, 10, 0.8); padding: 15px; border-radius: 8px; border: 1px solid #2a2a2a; }
        #localTimeLabel { font-size: 1.1em; }
        span.highlight { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1>Mô phỏng Chuyển Động Trái Đất</h1>
        <p>Phiên bản rút gọn 3D, tập trung vào đồ họa và chuyển động giống Earth Space Lab.</p>
        
        <div class="controls">
            <label for="spinSpeedSlider">Tốc độ Trái Đất tự quay (Ngày/Đêm):</label>
            <input type="range" id="spinSpeedSlider" min="0" max="1" step="0.01" value="0.3">
            
            <label for="orbitSpeedSlider">Tốc độ Trái Đất quay quanh Mặt Trời:</label>
            <input type="range" id="orbitSpeedSlider" min="0" max="0.1" step="0.001" value="0.01">
        </div>
    </div>

    <div class="status-panel">
        <div id="localTimeLabel">Giờ Máy tính: <span class="highlight" id="localTime"></span></div>
    </div>

    <canvas id="canvas3d"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r136/three.min.js"></script>
    <script>
        // --- 1. Thiết lập Cảnh, Camera, và Trình vẽ ---
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        const camera = new THREE.Camera(); // Camera sẽ ở vị trí mặc định (0,0,0)

        // Sẽ sử dụng trình vẽ 3D nếu trình duyệt hỗ trợ
        try {
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Thiết lập màu nền không gian đen
            scene.background = new THREE.Color(0x010101); 

            // --- 2. Tạo nền không gian đầy sao ---
            const starGeometry = new THREE.SphereGeometry(90, 64, 64);
            // Ảnh nền sao (mình sử dụng một ảnh mô phỏng có sẵn từ internet)
            const starTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/galaxy_starfield.png');
            const starMaterial = new THREE.MeshBasicMaterial({ map: starTexture, side: THREE.BackSide });
            const starSphere = new THREE.Mesh(starGeometry, starMaterial);
            scene.add(starSphere);

            // --- 3. Tạo Mặt Trời ---
            // Nguồn sáng chính
            const sunLight = new THREE.PointLight(0xffffff, 1.5, 300);
            scene.add(sunLight);

            // Hình cầu đại diện Mặt Trời
            const sunGeometry = new THREE.SphereGeometry(6, 64, 64);
            const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xf59e0b });
            const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sunMesh);

            // --- 4. Tạo Trái Đất ---
            const earthGeometry = new THREE.SphereGeometry(2.5, 64, 64);
            // Sử dụng ảnh bề mặt Trái Đất (NASA Visible Earth)
            const earthTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg');
            const earthMaterial = new THREE.MeshPhongMaterial({ map: earthTexture, shininess: 5, specular: 0x333333 });
            const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);

            // Tạo hiệu ứng mây Trái Đất (lớp phủ)
            const cloudGeometry = new THREE.SphereGeometry(2.52, 64, 64);
            const cloudTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_clouds_2048.png');
            const cloudMaterial = new THREE.MeshPhongMaterial({ map: cloudTexture, transparent: true, opacity: 0.8 });
            const cloudMesh = new THREE.Mesh(cloudGeometry, cloudMaterial);
            earthMesh.add(cloudMesh); // Gắn lớp mây vào Trái Đất

            // Gắn Trái Đất vào một vật thể không hình để mô phỏng quỹ đạo
            const earthPivot = new THREE.Object3D();
            earthPivot.add(earthMesh);
            scene.add(earthPivot);

            // Đặt Trái Đất ở một khoảng cách cố định so với Mặt Trời
            earthMesh.position.set(25, 0, 0);

            // Đặt Camera ở vị trí quan sát Trái Đất từ xa (Góc nhìn toàn cảnh)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 60);
            camera.lookAt(new THREE.Vector3(12, 0, 0)); // Nhìn về khoảng không giữa Mặt Trời và Trái Đất

            // --- 5. Tương tác Người dùng (Sliders) ---
            const spinSpeedSlider = document.getElementById('spinSpeedSlider');
            const orbitSpeedSlider = document.getElementById('orbitSpeedSlider');
            
            let spinSpeed = parseFloat(spinSpeedSlider.value);
            let orbitSpeed = parseFloat(orbitSpeedSlider.value);

            spinSpeedSlider.addEventListener('input', (e) => spinSpeed = parseFloat(e.target.value));
            orbitSpeedSlider.addEventListener('input', (e) => orbitSpeed = parseFloat(e.target.value));

            const localTimeSpan = document.getElementById('localTime');

            // --- 6. Vòng lặp Mô phỏng & Cập nhật ---
            function animate() {
                requestAnimationFrame(animate);

                // Cập nhật giờ hệ thống
                const now = new Date();
                localTimeSpan.innerText = now.toLocaleTimeString('vi-VN');

                // 1. Trái Đất tự quay quanh trục (Spin) -> Ngày/Đêm
                earthMesh.rotation.y += spinSpeed;

                // 2. Trái Đất quay quanh Mặt Trời (Orbit)
                earthPivot.rotation.y += orbitSpeed;

                // Cập nhật lớp mây quay chậm hơn một chút
                cloudMesh.rotation.y += spinSpeed * 0.15;

                // Vẽ cảnh
                renderer.render(scene, camera);
            }
            animate();

            // Xử lý khi thay đổi kích thước cửa sổ
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch(error) {
            // Hiển thị thông báo nếu trình duyệt không hỗ trợ WebGL
            const errorElement = document.createElement('div');
            errorElement.style.padding = '20px';
            errorElement.style.color = '#ef4444';
            errorElement.innerHTML = '<h2>Trình duyệt của bạn không hỗ trợ đồ họa 3D (WebGL).</h2><p>Vui lòng cập nhật hoặc sử dụng một trình duyệt hiện đại hơn để xem bản mô phỏng.</p>';
            document.body.appendChild(errorElement);
            document.getElementById('canvas3d').style.display = 'none';
        }

    </script>
</body>
</html>
