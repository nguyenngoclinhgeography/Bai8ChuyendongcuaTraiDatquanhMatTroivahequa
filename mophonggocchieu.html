<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Góc Chiếu Tia Sáng Mặt Trời</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #03030c; color: #fff; font-family: sans-serif; }
        #canvas3d { width: 100vw; height: 100vh; display: block; }
        
        /* Khung điều khiển thông minh */
        .ui-panel { 
            position: absolute; 
            background: rgba(5, 5, 15, 0.9); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.7); 
            border: 1px solid #334155; 
            z-index: 10; 
        }
        
        h1 { font-size: 1.15em; margin-top: 0; margin-bottom: 8px; color: #10b981; text-align: center; text-transform: uppercase; }
        h2 { font-size: 0.95em; color: #f59e0b; margin: 5px 0; text-align: center; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 12px; }
        button { flex: 1; padding: 8px; border: none; border-radius: 6px; background: #1e293b; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.85em; }
        button.active { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        
        .slider-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #38bdf8; font-size: 0.85em; }
        input[type=range] { width: 100%; cursor: pointer; }

        .info-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 0.85em; line-height: 1.4; border-left: 4px solid #f59e0b; }
        .info-box strong { color: #f43f5e; }

        /* Giao diện cho Máy tính */
        @media (min-width: 769px) {
            .ui-panel { top: 20px; left: 20px; width: 320px; }
        }

        /* Giao diện đặc trị cho Điện thoại */
        @media (max-width: 768px) {
            .ui-panel { bottom: 10px; left: 10px; right: 10px; padding: 10px; }
            h1 { font-size: 1em; margin-bottom: 5px; }
            .btn-group { margin-bottom: 8px; }
            .slider-group { margin-bottom: 8px; }
            .info-box { font-size: 0.75em; padding: 6px; }
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1>Góc chiếu tia sáng Mặt Trời</h1>
        
        <div class="btn-group">
            <button id="btnJune" class="active" onclick="setSolstice('june')">Ngày 22 tháng 6</button>
            <button id="btnDecember" onclick="setSolstice('december')">Ngày 22 tháng 12</button>
        </div>
        
        <div class="slider-group">
            <label id="dateLabel" for="dateSlider">Kéo để xem chuyển đổi ngày tự do:</label>
            <input type="range" id="dateSlider" min="0" max="180" step="1" value="0">
        </div>

        <h2 id="statusTitle">Ngày 22/6 (Hạ chí)</h2>
        <div class="info-box" id="analysisText">
            Đang tải dữ liệu địa lí...
        </div>
    </div>

    <canvas id="canvas3d"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Thiết lập không gian 3D
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        if(window.innerWidth < 768) {
            camera.position.set(0, 5, 45); // Góc nhìn điện thoại
        } else {
            camera.position.set(0, 0, 35); // Góc nhìn máy tính chính diện trực quan
        }

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Ánh sáng dịu nhẹ để học sinh thấy phần bán cầu tối (Đêm)
        scene.add(new THREE.AmbientLight(0x222233));

        // 2. Tạo hệ thống TIA SÁNG MẶT TRỜI SONG SONG (Mũi tên đỏ)
        const rayGroup = new THREE.Group();
        scene.add(rayGroup);

        function createSunRays() {
            // Xóa tia cũ nếu có
            while(rayGroup.children.length > 0){ rayGroup.remove(rayGroup.children[0]); }

            const rayColor = 0xef4444; // Màu đỏ đặc trưng trong sơ đồ
            const arrowLength = 8;
            const headLength = 0.8;
            const headWidth = 0.4;

            // Tạo các tia sáng song song phân bổ từ trên xuống dưới
            for (let y = -10; y <= 10; y += 2.5) {
                const origin = new THREE.Vector3(-18, y, 0);
                const dir = new THREE.Vector3(1, 0, 0).normalize(); // Chiếu thẳng từ trái sang phải
                
                const arrowHelper = new THREE.ArrowHelper(dir, origin, arrowLength, rayColor, headLength, headWidth);
                rayGroup.add(arrowHelper);
            }
        }
        createSunRays();

        // 3. Tạo TRÁI ĐẤT độ phân giải cao với màu sắc phân ranh giới rõ ràng
        const earthCanvas = document.createElement('canvas');
        earthCanvas.width = 512; earthCanvas.height = 256;
        const earthCtx = earthCanvas.getContext('2d');
        
        // Vẽ đại dương xanh mướt
        earthCtx.fillStyle = '#1e3a8a'; earthCtx.fillRect(0, 0, 512, 256);
        
        // Vẽ phác thảo các khối lục địa cơ bản cho sinh động
        earthCtx.fillStyle = '#15803d';
        function drawMapBlock(x, y, w, h) {
            earthCtx.beginPath(); earthCtx.roundRect(x, y, w, h, 20); earthCtx.fill();
        }
        drawMapBlock(50, 40, 120, 80);  // Bắc Mỹ / Á Âu
        drawMapBlock(80, 130, 80, 90);  // Nam Mỹ / Châu Phi
        drawMapBlock(280, 50, 160, 70); // Khối Á Âu lớn
        drawMapBlock(360, 140, 70, 50); // Ô-xtrây-li-a

        const earthTexture = new THREE.CanvasTexture(earthCanvas);
        const earthMesh = new THREE.Mesh(
            new THREE.SphereGeometry(6, 40, 40),
            new THREE.MeshStandardMaterial({ map: earthTexture, roughness: 0.8 })
        );

        // Ánh sáng hướng phát ra từ "Mặt Trời phía bên trái"
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
        sunLight.position.set(-1, 0, 0); // Chiếu từ trái sang phải
        scene.add(sunLight);

        // 4. Các ĐƯỜNG VĨ TUYẾN CHÍNH (Đường nét đứt chuẩn sư phạm)
        const linesGroup = new THREE.Group();
        
        function createLatitudeLine(y, color, labelText) {
            const radius = Math.sqrt(6*6 - y*y); // Tính bán kính đường tròn vĩ tuyến tại độ cao y
            const points = [];
            for (let i = 0; i <= 64; i++) {
                const theta = (i / 64) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(theta) * radius, y, Math.sin(theta) * radius));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.7 });
            const line = new THREE.Line(geometry, material);
            linesGroup.add(line);
        }

        // Tạo 5 đường vĩ tuyến mốc quan trọng giống hình 2 sách giáo khoa
        createLatitudeLine(0, 0xffffff);      // Xích đạo (Trắng)
        createLatitudeLine(2.38, 0xf59e0b);   // Chí tuyến Bắc 23°27' (Vàng)
        createLatitudeLine(-2.38, 0xf59e0b);  // Chí tuyến Nam 23°27' (Vàng)
        createLatitudeLine(5.12, 0x38bdf8);   // Vòng cực Bắc 66°33' (Xanh lam)
        createLatitudeLine(-5.12, 0x38bdf8);  // Vòng cực Nam 66°33' (Xanh lam)

        // Trục Trái Đất màu đỏ nghiêng
        const axisGeometry = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -9, 0), new THREE.Vector3(0, 9, 0)
        ]);
        const axisLine = new THREE.Line(axisGeometry, new THREE.LineBasicMaterial({ color: 0xef4444, linewidth: 2 }));
        linesGroup.add(axisLine);

        // Đóng gói hệ thống Trái Đất để nghiêng góc 23.5 độ cố định KHÔNG ĐỔI HƯỚNG
        const earthSystem = new THREE.Group();
        earthSystem.add(earthMesh);
        earthSystem.add(linesGroup);
        
        // Nghiêng trục theo trục Z để thể hiện rõ góc nghiêng so với mặt phẳng quỹ đạo
        earthSystem.rotation.z = 0.41; // ~23.5 độ
        scene.add(earthSystem);

        // Đẩy Trái Đất sang phải một chút để nhường không gian cho tia sáng chiếu vào
        earthSystem.position.set(4, 0, 0);

        // 5. Xử lý logic tương tác Địa lí
        const slider = document.getElementById('dateSlider');
        const statusTitle = document.getElementById('statusTitle');
        const analysisText = document.getElementById('analysisText');
        const btnJune = document.getElementById('btnJune');
        const btnDecember = document.getElementById('btnDecember');

        function updateSimulation() {
            const val = parseInt(slider.value);
            
            // Mô phỏng sự di chuyển quỹ đạo bằng cách xoay nhẹ toàn bộ hệ thống Trái Đất quanh trục Y
            // Điều này làm thay đổi phần bán cầu ngả về phía luồng ánh sáng cố định từ bên trái!
            earthSystem.rotation.y = (val / 180) * Math.PI;

            // Cập nhật bảng chữ phân tích động tùy thuộc vào vị trí thanh trượt
            if (val < 45) {
                statusTitle.innerText = "Ngày 22 tháng 6 (Hạ chí)";
                analysisText.innerHTML = "• <strong>Bán cầu Bắc</strong> đang ngả về phía Mặt Trời, có góc chiếu của tia sáng lớn, nhận được nhiều ánh sáng và nhiệt -> <strong>Mùa nóng</strong>.<br>• <strong>Bán cầu Nam</strong> chếch xa Mặt Trời, góc chiếu nhỏ, nhận ít nhiệt -> <strong>Mùa lạnh</strong>.";
                setActiveButton('june');
            } else if (val > 135) {
                statusTitle.innerText = "Ngày 22 tháng 12 (Đông chí)";
                analysisText.innerHTML = "• <strong>Bán cầu Nam</strong> đang ngả về phía Mặt Trời, góc chiếu tia sáng lớn, nhận được nhiều ánh sáng và nhiệt -> <strong>Mùa nóng</strong>.<br>• <strong>Bán cầu Bắc</strong> chếch xa Mặt Trời, góc chiếu rất nhỏ -> <strong>Mùa lạnh</strong>.";
                setActiveButton('december');
            } else {
                statusTitle.innerText = "Giai đoạn chuyển tiếp (Xuân phân / Thu phân)";
                analysisText.innerHTML = "Ánh sáng Mặt Trời đang phân bố đều về cả hai bán cầu. Góc chiếu tại Xích đạo đạt mức cao nhất (90 độ vào các ngày phân), hai bán cầu nhận lượng nhiệt và ánh sáng tương đương nhau.";
                clearActiveButtons();
            }
        }

        function setSolstice(type) {
            if (type === 'june') {
                slider.value = 0;
            } else {
                slider.value = 180;
            }
            updateSimulation();
        }

        function setActiveButton(type) {
            if (type === 'june') {
                btnJune.classList.add('active');
                btnDecember.classList.remove('active');
            } else {
                btnDecember.classList.add('active');
                btnJune.classList.remove('active');
            }
        }

        function clearActiveButtons() {
            btnJune.classList.remove('active');
            btnDecember.classList.remove('active');
        }

        slider.addEventListener('input', updateSimulation);
        
        // Khởi động bản phân tích đầu tiên
        updateSimulation();

        // 6. Vòng lặp Render hình ảnh tĩnh (Chỉ xoay nhẹ Trái Đất tự quay quanh trục để nhìn sinh động)
        function animate() {
            requestAnimationFrame(animate);
            earthMesh.rotation.y += 0.002; // Tự quay nhẹ quanh trục để học sinh thấy các mặt lục địa
            renderer.render(scene, camera);
        }
        animate();

        // Tự co giãn màn hình khi đổi thiết bị
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
